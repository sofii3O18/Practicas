<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Basico</title>
</head>

<body>

    <h1>Formulario 1</h1>

    <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <br><br>
        <button type="submit">Enviar</button>
    </form>
</body>

<body>
    <h1>Formulario De Selección</h1>
    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre">
        <br><br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email">
        <br><br>
        <label for="genero">Genero</label>
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="masculino">Masculino</label>
        <input type="radio" id="femenino" name="genero" value="femenino">
        <label for="femenino">Femenino</label>

        <br><br>
        <label for="pais">Pais</label>
        <select name="pais:" id="pais">
            <option value="china">Corea del Sur</option>
            <option value="mexico">Japón</option>
            <option value="usa">EE.UU</option>
            <option value="brasil">Costa Rica</option>
        </select>
        <br><br>
        <button type="submit">Enviar</button>
        <br><br>
        <label for="fecha">Fecha de nacimiento
            <input type="date" name="fecha" id="Fecha de nacimiento">
            <br><br>
        </label>
        <label for="color"> Color Favorito
            <input type="color" name="Rojo" id="Rojo vino">
            <br><br>
            <label for="reset">
                <input type="reset" name="Restablecer" id="Restablecer"> </label>
    </form>
</body>

</html
